# Airflow 공식 Helm Chart Values
# Repository: https://github.com/apache/airflow/tree/main/chart
# 참고: 이전 프로젝트 성공 코드 기반 수정

# Executor 설정 (LocalExecutor - MVP 단순화)
executor: "LocalExecutor"

# PostgreSQL Configuration (Use ECR)
postgresql:
  image:
    registry: 827913617635.dkr.ecr.ap-northeast-2.amazonaws.com
    repository: capa/postgres
    tag: "11"
  persistence:
    enabled: true
    size: 2Gi

# Redis (비활성화 - LocalExecutor 사용)
redis:
  enabled: false

# Explicitly enable standard jobs for DB migration and User creation
migrateDatabaseJob:
  enabled: true
  useHelmHooks: false
  applyCustomEnv: false

# Fixed secret key for all components (이전 프로젝트 성공 코드)
webserverSecretKey: capa_airflow_secret_key_2026_fixed

# Webserver
webserver:
  replicas: 1
  service:
    type: LoadBalancer # 외부 접근용
  defaultUser:
    enabled: true
    username: admin
    password: admin
    email: admin@example.com
  startupProbe:
    failureThreshold: 20 # 이전 프로젝트 값
    periodSeconds: 10
    timeoutSeconds: 10
  extraInitContainers: [] # 이전 프로젝트 코드 추가
  extraVolumes: []
  extraVolumeMounts: []

# Scheduler
scheduler:
  replicas: 1
  livenessProbe:
    initialDelaySeconds: 60
    failureThreshold: 5
    periodSeconds: 20
  extraInitContainers: [] # 이전 프로젝트 코드 추가
  extraVolumes: []
  extraVolumeMounts: []

# Triggerer
triggerer:
  extraInitContainers: [] # 이전 프로젝트 코드 추가
  extraVolumes: []
  extraVolumeMounts: []

# DAG 저장소 (Git Sync 활성화, PVC 비활성화)
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/janghyunwoo2/CAPA.git
    branch: main
    subPath: services/airflow-dags
    wait: 60

# Airflow Configuration (이전 프로젝트 방식)
airflow:
  config:
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"

# IRSA (EKS OIDC 설정 후 활성화)
serviceAccount:
  create: true
  name: airflow-sa
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/capa-airflow-role

# 리소스 제한
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi
