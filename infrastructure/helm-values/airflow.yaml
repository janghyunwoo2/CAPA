# Airflow 공식 Helm Chart Values
# Repository: https://github.com/apache/airflow/tree/main/chart
# 참고: 이전 프로젝트 성공 코드 기반 수정

# Executor 설정 (LocalExecutor - MVP 단순화)
executor: "LocalExecutor"

# PostgreSQL Configuration (Use ECR)
postgresql:
  image:
    registry: 827913617635.dkr.ecr.ap-northeast-2.amazonaws.com
    repository: capa/postgres
    tag: "11"
  persistence:
    enabled: true
    size: 2Gi
  primary:
    nodeSelector:
      node-type: core

# Redis (비활성화 - LocalExecutor 사용)
redis:
  enabled: false

# Explicitly enable standard jobs for DB migration and User creation
migrateDatabaseJob:
  enabled: true
  useHelmHooks: false
  applyCustomEnv: false

# Fixed secret key for all components (이전 프로젝트 성공 코드)
webserverSecretKey: capa_airflow_secret_key_2026_fixed

# Webserver
webserver:
  replicas: 1
  service:
    type: ClusterIP # Ingress를 통해 통합 관리 예정
  defaultUser:
    enabled: true
    username: admin
    password: admin
    email: admin@example.com
  startupProbe:
    failureThreshold: 20 # 이전 프로젝트 값
    periodSeconds: 10
    timeoutSeconds: 10
  extraInitContainers: [] # 이전 프로젝트 코드 추가
  extraVolumes: []
  extraVolumeMounts: []
  nodeSelector:
    node-type: core

# Scheduler
scheduler:
  replicas: 1
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 20
    periodSeconds: 20
    timeoutSeconds: 20
  extraInitContainers: [] # 이전 프로젝트 코드 추가
  extraVolumes: []
  extraVolumeMounts: []
  nodeSelector:
    node-type: core

# Triggerer - 스팟 노드에 배치 (Karpenter 관리)
triggerer:
  extraInitContainers: [] # 이전 프로젝트 코드 추가
  extraVolumes: []
  extraVolumeMounts: []
  # [Karpenter] 스팟 노드 배치 허용 - Triggerer는 재시작에 강함
  tolerations:
    - key: "karpenter.sh/disruption"
      operator: "Exists"
      effect: "NoSchedule"

# DAG 저장소 (Git Sync 활성화, PVC 비활성화)
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/janghyunwoo2/CAPA.git
    branch: feat/t1/t2s-ph2
    subPath: services/airflow-dags
    wait: 60

# Airflow Configuration - 공식 Helm 차트 방식 (최상위 config 키)
# 참고: airflow.config는 공식 차트에 없음. 최상위 config + env 사용
config:
  core:
    load_examples: "False"
  webserver:
    expose_config: "True"
    web_server_master_timeout: "300"
    web_server_worker_timeout: "300"
    base_url: "http://k8s-capaunifiedlb-ab7aaac323-480086301.ap-northeast-2.elb.amazonaws.com/airflow"
    enable_proxy_fix: "True"

# 환경변수 직접 주입 (config가 반영 안될 경우 fallback)
env:
  - name: AIRFLOW__WEBSERVER__BASE_URL
    value: "http://k8s-capaunifiedlb-ab7aaac323-480086301.ap-northeast-2.elb.amazonaws.com/airflow"
  - name: AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX
    value: "True"
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"

# IRSA (EKS OIDC 설정 후 활성화)
serviceAccount:
  create: true
  name: airflow-sa
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/capa-airflow-role

# 리소스 제한
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi
