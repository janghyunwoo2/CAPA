[pytest]
# Phase 1 & 2 테스트 설정

# 테스트 경로
testpaths = tests

# 테스트 검색 패턴
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 마커 정의
markers =
    unit: 단위 테스트 (Phase 1)
    integration: 통합 테스트 (Phase 2)
    asyncio: 비동기 테스트
    slow: 느린 테스트

# 비동기 테스트 모드
asyncio_mode = auto

# 로깅
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 커버리지
addopts =
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    -v
