name: anomaly_detector_airflow

services:
  postgres:
    image: postgres:13
    container_name: anomaly_detector_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: anomaly_detector_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: on-failure

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: anomaly_detector_airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      # Airflow 컨테이너가 호스트의 도커를 사용할 수 있도록 소켓 마운트
      - /var/run/docker.sock:/var/run/docker.sock
      # anomaly_detector 소스 디렉토리를 컨테이너 내부 리눅스 경로로 마운트
      - C:/Users/Dell3571/Desktop/projects/CAPA/services/t3_anomaly_detector:/opt/anomaly_detector
      # AWS 자격증명 마운트
      - C:/Users/Dell3571/.aws:/root/.aws:ro
    ports:
      - "8083:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: anomaly_detector_airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      # Airflow 스케줄러도 도커 소켓이 필요 (docker run 명령 실행용)
      - /var/run/docker.sock:/var/run/docker.sock
      # anomaly_detector 소스 디렉토리를 컨테이너 내부 리눅스 경로로 마운트
      - C:/Users/Dell3571/Desktop/projects/CAPA/services/t3_anomaly_detector:/opt/anomaly_detector
      # AWS 자격증명 마운트
      - C:/Users/Dell3571/.aws:/root/.aws:ro
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
