[pytest]
# Pytest configuration for CAPA Airflow DAG tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Add current directory to Python path
pythonpath = .

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --showlocals

# Markers for test categorization
markers =
    unit: Unit tests (isolated, no external dependencies)
    integration: Integration tests (may require external services)
    slow: Slow tests (takes > 5 seconds)
    dag: DAG structure tests
    quality: Data quality tests
    schema: Schema extraction tests
    preagg: Pre-aggregation tests

# Test collection options
testpaths = tests

# Show summary of all test outcomes
console_output_style = progress

# Strict, short summary of failures
# Set to False to allow skipped/xfail
strict_config = True
