apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: default
  labels:
    app: log-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      serviceAccountName: log-generator-sa
      containers:
      - name: log-generator
        image: <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/capa-log-generator:latest
        imagePullPolicy: Always
        env:
        - name: STREAM_NAME
          value: "capa-stream"
        - name: AWS_REGION
          value: "ap-northeast-2"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
