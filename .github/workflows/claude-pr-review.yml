name: Claude PR 자동 리뷰

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # PR 생성/업데이트 또는 @claude 멘션 코멘트일 때만 실행
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          custom_instructions: |
            CAPA 프로젝트 코딩 규칙을 기준으로 PR을 검토하세요.

            ## 필수 검토 항목
            1. 타입 힌트 - 모든 Python 함수에 타입 힌트 있는지 확인
            2. 에러 핸들링 - async 함수 및 boto3 호출에 try-except 있는지 확인
            3. 로깅 - print() 대신 logging 모듈 사용하는지 확인
            4. Docker 이미지 - latest 태그 사용 금지, 버전 명시 필수
            5. Airflow DAG - default_args에 retries, retry_delay, email_on_failure 있는지 확인

            ## 출력 형식
            위반 사항은 파일명과 라인 번호를 명시하고 수정 방법을 한국어로 안내하세요.
