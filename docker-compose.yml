version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: capa-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - capa-network

  airflow-webserver:
    image: apache/airflow:2.7.3-python3.11
    container_name: capa-airflow-webserver
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW_UID: 50000
      AIRFLOW_GID: 0
    ports:
      - "8080:8080"
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./src/airflow/config:/opt/airflow/config
    networks:
      - capa-network
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.7.3-python3.11
    container_name: capa-airflow-scheduler
    depends_on:
      - postgres
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW_UID: 50000
      AIRFLOW_GID: 0
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./src/airflow/config:/opt/airflow/config
    networks:
      - capa-network
    command: scheduler

  # Redash (선택사항 - 로컬 개발용)
  # redash:
  #   image: redash/redash:latest
  #   container_name: capa-redash
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     COMPOSE_PROJECT_NAME: capa
  #   networks:
  #     - capa-network

volumes:
  postgres_data:

networks:
  capa-network:
    driver: bridge
