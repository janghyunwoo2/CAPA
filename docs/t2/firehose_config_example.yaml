# Kinesis Data Firehose 설정 예제
# AWS Kinesis Data Firehose Delivery Stream 구성

firehose_configuration:
  delivery_stream_name: capa-ad-logs-firehose-prod
  
  # 소스: Kinesis Data Streams
  source:
    type: kinesis_stream
    stream_name: capa-ad-logs-prod
    
  # 대상: S3
  destination:
    type: extended_s3
    
    # S3 버킷 설정
    s3_configuration:
      bucket_name: capa-data-lake-827913617635
      
      # 파티셔닝 구조 (Hive 스타일)
      prefix: "raw/streaming/log_type=!{partitionKeyFromQuery:log_type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/"
      error_output_prefix: "raw/streaming-errors/"
      
      # 버퍼링 설정
      buffering_hints:
        interval_in_seconds: 60    # 60초마다 또는
        size_in_mbs: 128           # 128MB가 되면 S3로 flush
      
      # 압축 설정
      compression_format: GZIP     # UNCOMPRESSED, GZIP, ZIP, SNAPPY
      
    # 데이터 형식 변환 (JSON → Parquet)
    data_format_conversion:
      enabled: true
      
      # 입력 형식
      input_format:
        deserializer:
          type: json
          
      # 출력 형식
      output_format:
        serializer:
          type: parquet
          
      # AWS Glue Data Catalog 스키마
      schema_configuration:
        database_name: capa_logs_db
        table_name: ad_logs_streaming
        version: LATEST
        
  # 데이터 처리 설정
  processing_configuration:
    enabled: true
    processors:
      # 레코드 필터링/변환
      - type: Lambda
        parameters:
          function_name: capa-log-transformer
          
      # 동적 파티셔닝
      - type: MetadataExtraction
        parameters:
          - name: MetadataExtractionQuery
            value: |
              {
                log_type: .log_type,
                timestamp: .timestamp
              }
          - name: JsonParsingEngine
            value: JQ1.6
            
  # 에러 레코드 처리
  error_record_configuration:
    error_output_prefix: "raw/streaming-errors/"
    
  # CloudWatch 로깅
  cloudwatch_logging:
    enabled: true
    log_group: /aws/kinesisfirehose/capa-ad-logs
    log_stream: delivery-stream
    
  # 태그
  tags:
    Environment: production
    Project: CAPA
    Team: data-engineering
    Purpose: ad-log-streaming

# Lambda 변환 함수 예제
lambda_transformer:
  runtime: python3.9
  handler: transform.handler
  code: |
    import json
    import base64
    from datetime import datetime
    
    def handler(event, context):
        output = []
        
        for record in event['records']:
            # Base64 디코딩
            payload = json.loads(
                base64.b64decode(record['data']).decode('utf-8')
            )
            
            # 데이터 변환
            # 1. timestamp 형식 통일
            if 'timestamp' in payload:
                try:
                    dt = datetime.fromisoformat(payload['timestamp'])
                    payload['timestamp'] = dt.strftime('%Y-%m-%d %H:%M:%S')
                    payload['dt'] = dt.strftime('%Y-%m-%d')  # 파티션용
                except:
                    pass
            
            # 2. 필드 추가
            payload['processed_at'] = datetime.now().isoformat()
            payload['firehose_version'] = '1.0'
            
            # 3. 민감 정보 마스킹
            if 'ip_address' in payload:
                parts = payload['ip_address'].split('.')
                if len(parts) == 4:
                    parts[3] = '0'
                    payload['ip_address'] = '.'.join(parts)
            
            # 결과 반환
            output_record = {
                'recordId': record['recordId'],
                'result': 'Ok',
                'data': base64.b64encode(
                    json.dumps(payload).encode('utf-8')
                ).decode('utf-8')
            }
            output.append(output_record)
        
        return {'records': output}

# 모니터링 알람 설정
cloudwatch_alarms:
  - name: firehose-high-error-rate
    metric: DeliveryToS3.DataFreshness
    threshold: 900  # 15분
    comparison: GreaterThanThreshold
    
  - name: firehose-incoming-records-drop
    metric: IncomingRecords
    threshold: 100
    comparison: LessThanThreshold
    evaluation_periods: 2
    
  - name: firehose-delivery-success-rate
    metric: DeliveryToS3.Success
    threshold: 0.95
    comparison: LessThanThreshold