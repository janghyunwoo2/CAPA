# CAPA Airflow - 개발 환경 Helm Values

airflow:
  config:
    AIRFLOW__CORE__EXECUTOR: KubernetesExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__REMOTE_LOGGING: "True"
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: aws_s3_dev
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://capa-airflow-logs-dev"

  webserver:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  dags:
    gitSync:
      enabled: true
      repo: "https://github.com/YOUR_ORG/CAPA.git"
      branch: develop # 개발 브랜치
      wait: 10

  postgresql:
    primary:
      persistence:
        enabled: true
        size: 5Gi

# 네임스페이스
namespace: airflow-dev

# 개발 환경 플래그
environment: dev
enableLogging: true
