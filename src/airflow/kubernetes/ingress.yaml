    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:123456789012:certificate/xxxxx # 변경 필요
spec:
  rules:
    - host: airflow-prod.example.com # 변경 필요
      http:
        paths:
          - path: /
            pathType: Prefix
