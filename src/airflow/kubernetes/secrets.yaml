# AWS 자격증명 Secret (템플릿)
# 다음 명령으로 생성:
# kubectl create secret generic airflow-aws-secret \
#   --from-literal=AWS_ACCESS_KEY_ID=YOUR_KEY \
#   --from-literal=AWS_SECRET_ACCESS_KEY=YOUR_SECRET \
#   -n airflow-dev

apiVersion: v1
kind: Secret
metadata:
  name: airflow-aws-secret
  namespace: airflow-dev
type: Opaque
data:
  AWS_ACCESS_KEY_ID: "" # base64로 인코딩된 값
  AWS_SECRET_ACCESS_KEY: "" # base64로 인코딩된 값
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-aws-secret
  namespace: airflow-prod
type: Opaque
data:
  AWS_ACCESS_KEY_ID: "" # base64로 인코딩된 값
  AWS_SECRET_ACCESS_KEY: "" # base64로 인코딩된 값

---
# Git 저장소 접근 Secret (프라이빗 레포지토리의 경우)
apiVersion: v1
kind: Secret
metadata:
  name: git-secret
  namespace: airflow-dev
type: kubernetes.io/basic-auth
stringData:
  username: YOUR_GITHUB_USERNAME
  password: YOUR_GITHUB_TOKEN # Personal Access Token
---
apiVersion: v1
kind: Secret
metadata:
  name: git-secret
  namespace: airflow-prod
type: kubernetes.io/basic-auth
stringData:
  username: YOUR_GITHUB_USERNAME
  password: YOUR_GITHUB_TOKEN
